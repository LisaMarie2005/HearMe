<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>HearMe</title>
</head>
<body>
  <!-- THE RADIO DISPLAY -->
  <div id="radio">

    <div id="now-playing-title">Select a playlist to start</div> <!-- song title goes here -->
    <div id="now-playing-artist"></div>

    <div id="controls"> <!-- play/pause/next/prev buttons -->
      <button onclick="prevSong()">⏮ Prev</button> 
      <button onclick="togglePlay()" id="play-btn">▶ Play</button>
      <button onclick="nextSong()">⏭ Next</button>
    </div>
    <!-- PLAYLIST NAME -->
    <div id="playlist-name">— no playlist —</div>

  </div>

  <!-- PLAYLIST BUTTONS  not implemented yet-->
  <div id="playlist-buttons"></div>

 
</div>

<!-- Button to open the modal -->
<button onclick="openNewPlaylist()">+ New Playlist</button>

  <script src="app.js"></script>
</body>
</html>
